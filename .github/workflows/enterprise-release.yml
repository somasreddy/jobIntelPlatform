name: Enterprise Release Gates

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  backend:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - run: python -m pip install --upgrade pip
      - run: pip install -r backend/requirements.txt
      - run: python -m pytest -q -m "not integration" -p no:cacheprovider backend
      - run: python -m compileall -q backend workers

  frontend:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npx tsc --noEmit
      - run: npm run build

  migration-contract:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Ensure controlled migration artifacts exist
        shell: bash
        run: |
          test -f database/enterprise_v2_preflight.sql
          test -f database/enterprise_v2.sql
          test -f database/enterprise_v2_seed.sql
          test -f database/enterprise_v2_verify.sql
          test -f database/profile_intelligence_v1.sql
          test -f database/admin_governance_v1.sql
          grep -q "applications_status_check" database/enterprise_v2.sql
          grep -q "REVOKE ALL" database/enterprise_v2.sql
